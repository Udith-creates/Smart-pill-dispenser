<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Medication Dispenser - Circuit Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@500;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body, html { height: 100vh; font-family: 'Inter', sans-serif; display: flex; background: #0f172a; overflow: hidden; }

.hardware { flex: 1.2; background: #1e293b; color: white; border-right: 2px solid #000; position: relative; padding: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.dashboard { flex: 0.8; background: #f8fafc; padding: 2rem; display: flex; flex-direction: column; }

/* Dashboard Styles */
.header { border-bottom: 2px solid #e2e8f0; padding-bottom: 1rem; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 1.5rem; color: #0f172a; }
.status { color: #10b981; font-weight: 600; background: #d1fae5; padding: 0.5rem 1rem; border-radius: 20px; display: flex; align-items: center; }
.status::before { content: ''; display: inline-block; width: 10px; height: 10px; background: #10b981; border-radius: 50%; margin-right: 8px; animation: blink 2s infinite; }
.card { background: white; border-radius: 12px; padding: 1.5rem; border: 1px solid #e2e8f0; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
.card h2 { font-size: 1rem; color: #64748b; margin-bottom: 0.5rem; }
.next-dose { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
.log-wrapper { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
.log-header { padding: 1rem 1.5rem; border-bottom: 1px solid #e2e8f0; background: #f8fafc; font-weight: 600; color: #64748b; }
.log-container { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; background: #fff; }
.log-item { padding: 0.8rem 1rem; border-left: 4px solid #cbd5e1; border-radius: 6px; background: #f8fafc; color: #334155; font-size: 0.95rem; animation: slideIn 0.3s; }
.log-item.alert { border-color: #ef4444; color: #b91c1c; background: #fef2f2; font-weight: 600; }
.log-item.success { border-color: #10b981; color: #047857; background: #ecfdf5; font-weight: 600; }
.btn-override { margin-top: 1.5rem; padding: 1.2rem; font-size: 1.1rem; font-weight: 700; background: #ef4444; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.btn-override:hover { background: #dc2626; }

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

/* Circuit SVG Styles */
.circuit-svg { width: 100%; height: 100%; max-height: 80vh; }
.wire { fill: none; stroke: #475569; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.3s; }
.wire-vcc { stroke: #ef4444; }
.wire-gnd { stroke: #0f172a; }
.wire-sda { stroke: #3b82f6; }
.wire-scl { stroke: #eab308; }
.wire-signal { stroke: #10b981; }

.active-signal { animation: strokePulse 1s infinite, flow 0.5s linear infinite; stroke-dasharray: 10; }
@keyframes strokePulse { 0%, 100% { filter: drop-shadow(0 0 5px currentColor); } 50% { filter: drop-shadow(0 0 15px currentColor); } }
@keyframes flow { to { stroke-dashoffset: -20; } }

.lcd-text { font-family: 'Orbitron', monospace; font-size: 28px; fill: #000; }
.lcd-bg { fill: #86efac; transition: fill 0.3s; }
.lcd-bg.alert { fill: #fca5a5; }

.servo-arm { transform-origin: 30px 15px; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
.servo-arm.open { transform: rotate(90deg); }

.pill { transition: transform 0.8s, opacity 0.5s; opacity: 0; transform: translateY(0); }
.pill.dropped { opacity: 1; transform: translateY(120px); }

.btn-interactive { cursor: pointer; transition: 0.2s; }
.btn-interactive:hover { filter: brightness(1.2); }
.btn-interactive.pulsing { animation: btnPulse 1s infinite alternate; }
@keyframes btnPulse { from { fill: #f87171; filter: drop-shadow(0 0 10px #f87171); } to { fill: #dc2626; filter: none; } }

.buzzer-wave { opacity: 0; stroke: #ef4444; fill: none; stroke-width: 3; stroke-linecap: round; }
.buzzer-wave.active { animation: soundWave 0.5s infinite; opacity: 1; }
@keyframes soundWave { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
</style>
</head>
<body>

<div class="hardware">
  <svg class="circuit-svg" viewBox="0 0 1000 700">
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </defs>

    <!-- UI Background Grid for technical feel -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <rect width="1000" height="700" fill="url(#grid)" />

    <!-- WIRES (Drawn first so they are behind components) -->
    <!-- I2C from Arduino to RTC to LCD -->
    <path class="wire wire-sda sda-path" d="M 280 430 L 280 480 L 150 480 L 150 250 L 200 250" />
    <path class="wire wire-sda sda-path" d="M 200 250 L 480 250 L 480 180" />
    <path class="wire wire-scl scl-path" d="M 300 430 L 300 500 L 130 500 L 130 230 L 200 230" />
    <path class="wire wire-scl scl-path" d="M 200 230 L 500 230 L 500 180" />
    
    <!-- Power/GND from Arduino -->
    <path class="wire wire-vcc" d="M 320 430 L 320 520 L 700 520 L 700 450" />
    <path class="wire wire-gnd" d="M 340 430 L 340 540 L 720 540 L 720 450" />

    <!-- Button to Breadboard / Arduino -->
    <path class="wire wire-vcc" d="M 750 420 L 750 520" />
    <path class="wire wire-signal btn-wire" d="M 780 420 L 780 480 L 400 480 L 400 430" />

    <!-- Servo to Arduino -->
    <path class="wire wire-signal servo-wire" d="M 380 320 L 380 200 L 750 200 L 750 160" />
    <path class="wire wire-vcc" d="M 770 160 L 770 230 L 700 230 L 700 520" />
    <path class="wire wire-gnd" d="M 790 160 L 790 250 L 720 250 L 720 540" />

    <!-- Buzzer to Arduino -->
    <path class="wire wire-signal buzzer-wire" d="M 360 320 L 360 270 L 850 270 L 850 300" />
    <path class="wire wire-gnd" d="M 870 300 L 870 540 L 720 540" />

    <!-- COMPONENTS -->
    <!-- Arduino Uno -->
    <g transform="translate(200, 320)">
      <rect width="240" height="150" fill="#024151" rx="10" stroke="#00979C" stroke-width="4"/>
      <text x="120" y="80" fill="white" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="2">ARDUINO UNO</text>
      <!-- Pins Top -->
      <rect x="20" y="-5" width="200" height="10" fill="#222" />
      <text x="20" y="20" fill="#fff" font-size="10">DIGITAL PINS</text>
      <!-- Pins Bottom -->
      <rect x="20" y="145" width="200" height="10" fill="#222" />
      <text x="50" y="135" fill="#fff" font-size="10">ANALOG IN</text>
      <!-- USB / PWR -->
      <rect x="-10" y="20" width="20" height="40" fill="#ccc" />
      <rect x="-10" y="90" width="20" height="30" fill="#111" />
    </g>

    <!-- DS1307 RTC -->
    <g transform="translate(200, 200)">
      <rect width="90" height="60" fill="#1b4b8a" rx="5" />
      <circle cx="25" cy="30" r="15" fill="#c0c0c0" /> 
      <text x="60" y="25" fill="white" font-size="10" font-weight="bold">DS1307</text>
      <text x="60" y="38" fill="white" font-size="8">RTC</text>
      <rect x="85" y="10" width="10" height="40" fill="#222" />
    </g>

    <!-- 16x2 LCD Display -->
    <g transform="translate(450, 60)">
      <rect width="250" height="100" fill="#1f2937" rx="8" stroke="#374151" stroke-width="2"/>
      <rect id="lcd-screen" x="15" y="15" width="220" height="70" class="lcd-bg" rx="4"/>
      <text id="lcd-time" x="125" y="45" class="lcd-text" text-anchor="middle">07:59:50 AM</text>
      <text x="125" y="70" font-family="monospace" font-size="14" fill="#000" text-anchor="middle" font-weight="bold">SYSTEM READY</text>
      <!-- Pins -->
      <rect x="20" y="95" width="100" height="10" fill="#222" />
    </g>

    <!-- Servo Motor -->
    <g transform="translate(730, 80)">
      <rect width="80" height="80" fill="#1d4ed8" rx="8" />
      <text x="40" y="70" fill="white" font-size="12" text-anchor="middle" font-weight="bold">SERVO</text>
      <rect x="15" y="-10" width="50" height="30" fill="#3b82f6" rx="5" />
      <!-- Arm -->
      <g id="servo-arm" class="servo-arm" transform="translate(40, -5)">
        <rect x="-15" y="-10" width="70" height="20" fill="#f8fafc" rx="10" />
        <circle cx="0" cy="0" r="6" fill="#334155" />
      </g>
    </g>

    <!-- Dispenser Pipe -->
    <path d="M 850 30 L 850 150" stroke="#334155" stroke-width="40" stroke-linecap="square"/>
    <path d="M 850 110 L 850 160" stroke="#000" stroke-width="36" stroke-linecap="square"/>
    
    <!-- Pill -->
    <g id="pill" class="pill" transform="translate(850, 40)">
      <rect x="-15" y="-25" width="30" height="50" fill="url(#pill-grad)" rx="15" />
      <path d="M -15 0 L 15 0" stroke="#fff" stroke-width="2" />
    </g>
    <defs>
      <linearGradient id="pill-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="50%" stop-color="#38bdf8"/>
        <stop offset="50%" stop-color="#0284c7"/>
      </linearGradient>
    </defs>

    <!-- Piezo Buzzer -->
    <g transform="translate(860, 300)">
      <circle cx="0" cy="0" r="25" fill="#111827" stroke="#374151" stroke-width="3"/>
      <circle cx="0" cy="0" r="10" fill="#000" />
      <!-- Sound waves -->
      <path class="buzzer-wave" d="M 20 -20 Q 30 -10 30 0 Q 30 10 20 20" />
      <path class="buzzer-wave" d="M 30 -30 Q 45 -15 45 0 Q 45 15 30 30" style="animation-delay: 0.1s" />
      <path class="buzzer-wave" d="M 40 -40 Q 60 -20 60 0 Q 60 20 40 40" style="animation-delay: 0.2s" />
    </g>

    <!-- Breadboard (Simplified) -->
    <g transform="translate(580, 500)">
      <rect width="250" height="150" fill="#f1f5f9" rx="10" />
      <text x="125" y="140" fill="#94a3b8" font-size="12" text-anchor="middle" font-weight="bold">BREADBOARD</text>
      <!-- Power rails -->
      <line x1="20" y1="20" x2="230" y2="20" stroke="#ef4444" stroke-width="2" />
      <line x1="20" y1="40" x2="230" y2="40" stroke="#0f172a" stroke-width="2" />
      <circle cx="120" cy="20" r="3" fill="#000" />
      <circle cx="140" cy="40" r="3" fill="#000" />
      
      <!-- Push Button -->
      <g transform="translate(150, 60)">
        <rect x="0" y="0" width="40" height="40" fill="#334155" rx="5" />
        <circle id="btn-svg-confirm" cx="20" cy="20" r="14" fill="#a0aec0" class="btn-interactive" />
        <!-- Pin legs -->
        <line x1="0" y1="10" x2="-10" y2="10" stroke="#64748b" stroke-width="2" />
        <line x1="0" y1="30" x2="-10" y2="30" stroke="#64748b" stroke-width="2" />
        <line x1="40" y1="10" x2="50" y2="10" stroke="#64748b" stroke-width="2" />
        <line x1="40" y1="30" x2="50" y2="30" stroke="#64748b" stroke-width="2" />
      </g>
    </g>

  </svg>
</div>

<div class="dashboard">
  <div class="header">
    <h1>Rose's Med-Manager</h1>
    <div class="status">Hardware Online</div>
  </div>
  <div class="card">
    <h2>Next Scheduled Dose</h2>
    <div class="next-dose" id="next-dose">08:00 AM - Heart Medication</div>
  </div>
  <div class="log-wrapper">
    <div class="log-header">Live Activity Log</div>
    <div class="log-container" id="log-container">
      <div class="log-item">02:00 PM - Vitamins Taken</div>
      <div class="log-item">08:00 AM - Blood Pressure Meds Taken</div>
      <div class="log-item">Yesterday, 06:00 PM - Evening Meds Taken</div>
    </div>
  </div>
  <button class="btn-override" id="btn-override">🚨 Emergency Override: Dispense Now</button>
</div>

<script>
  let isDispensing = false;
  let clockTime = new Date("2024-01-01T07:59:50");

  const lcdTime = document.getElementById('lcd-time');
  const lcdScreen = document.getElementById('lcd-screen');
  const servoArm = document.getElementById('servo-arm');
  const pill = document.getElementById('pill');
  const btnSvgConfirm = document.getElementById('btn-svg-confirm');
  const buzzerWaves = document.querySelectorAll('.buzzer-wave');
  const logContainer = document.getElementById('log-container');
  const nextDoseEl = document.getElementById('next-dose');
  const btnOverride = document.getElementById('btn-override');

  const sdaSclPaths = document.querySelectorAll('.sda-path, .scl-path');
  const servoWire = document.querySelector('.servo-wire');
  const buzzerWire = document.querySelector('.buzzer-wire');
  const btnWire = document.querySelector('.btn-wire');

  const formatTime = (date) => date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  const addLog = (msg, type = '') => {
    const entry = document.createElement('div');
    entry.className = `log-item ${type}`;
    entry.textContent = msg;
    logContainer.prepend(entry);
  };

  const triggerDispense = (isOverride = false) => {
    if (isDispensing) return;
    isDispensing = true;

    // Data flow animation
    sdaSclPaths.forEach(p => p.classList.add('active-signal'));
    
    setTimeout(() => {
      // Hardware Actuation
      lcdScreen.classList.add('alert');
      lcdTime.nextElementSibling.textContent = 'DISPENSING...';
      
      servoWire.classList.add('active-signal');
      servoArm.classList.add('open');
      
      buzzerWire.classList.add('active-signal');
      buzzerWaves.forEach(w => w.classList.add('active'));

      setTimeout(() => pill.classList.add('dropped'), 600);
      
      // Enable Confirm Button
      btnSvgConfirm.classList.add('pulsing');
      
      const timeStr = formatTime(clockTime);
      addLog(isOverride ? `${timeStr} - EMERGENCY OVERRIDE TRIGGERED 🚨` : `${timeStr} - ALARM ACTIVE: Waiting for Patient`, 'alert');
    }, 500); // Small delay to simulate processing
  };

  const confirmMedication = () => {
    if (!isDispensing) return;
    isDispensing = false;

    // Trace signal flow from button
    btnWire.classList.add('active-signal');

    setTimeout(() => {
      // Reset Hardware
      sdaSclPaths.forEach(p => p.classList.remove('active-signal'));
      servoWire.classList.remove('active-signal');
      buzzerWire.classList.remove('active-signal');
      btnWire.classList.remove('active-signal');
      
      lcdScreen.classList.remove('alert');
      lcdTime.nextElementSibling.textContent = 'SYSTEM READY';
      
      servoArm.classList.remove('open');
      buzzerWaves.forEach(w => w.classList.remove('active'));
      pill.classList.remove('dropped');
      btnSvgConfirm.classList.remove('pulsing');
      btnSvgConfirm.style.fill = '#a0aec0';

      const timeStr = formatTime(clockTime);
      addLog(`${timeStr} - Medication Taken ✅`, 'success');
      nextDoseEl.textContent = '06:00 PM - Evening Meds';
    }, 400);
  };

  btnSvgConfirm.addEventListener('click', confirmMedication);
  btnOverride.addEventListener('click', () => triggerDispense(true));

  // Clock TICK - simulate time based logic
  setInterval(() => {
    clockTime.setSeconds(clockTime.getSeconds() + 1);
    const timeStr = formatTime(clockTime);
    lcdTime.textContent = timeStr;

    if (timeStr === "08:00:00 AM" && !isDispensing) {
      triggerDispense(false);
    }
  }, 1000);
</script>
</body>
</html>
